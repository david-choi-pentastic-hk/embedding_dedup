<html lang="en">
    <head>

        <title>Embedding Dedup</title>

    <body>
        <div class="container">
            Embedding Dedup.

            <form action="/" method="POST" enctype="multipart/form-data">

                <input class="form-control mb-3" type="file" id="csv-file" name="uploaded_file" accept="text/csv">

            The speed depends on the server computation power.
